name: Scheduled Sync

on:
  schedule:
    - cron: "0 * * * *"  # Every hour at :00
  workflow_dispatch:       # Allow manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger sync
        run: |
          RESPONSE=$(curl -s -o /tmp/body.txt -w "%{http_code}" -X POST \
            "https://eduvidual-to-todoist.netlify.app/do-sync?pwd=${{ secrets.STATUS_PASSWORD }}")
          echo "HTTP status: $RESPONSE"
          echo "Response body: $(cat /tmp/body.txt)"
          if [ "$RESPONSE" != "200" ]; then
            echo "Sync failed with status $RESPONSE"
            exit 1
          fi
